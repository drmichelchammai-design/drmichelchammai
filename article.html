<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مقال - الدكتور ميشال الشمّاعي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
body{font-family:Tahoma,Arial,sans-serif;background:#eaf1fa;margin:0;padding:40px 20px;}
.wrap{max-width:800px;margin:0 auto;background:white;padding:40px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.back{display:inline-block;margin-bottom:20px;color:#0b63ce;text-decoration:none;font-size:15px;}
h1{color:#222;margin-top:10px;}
.meta{color:#777;margin-bottom:25px;font-size:14px;}
.category{display:inline-block;background:#eef3fb;color:#0b63ce;font-size:13px;padding:3px 10px;border-radius:20px;margin-inline-start:8px;}
img.cover{width:100%;border-radius:8px;margin-bottom:25px;}
.content{line-height:1.9;font-size:18px;color:#333;}
.empty{text-align:center;color:#999;margin-top:60px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="articles.html">← العودة إلى المقالات</a>
  <div id="article-content"><div class="empty">جارٍ التحميل...</div></div>
</div>
<script>
const MONTHS_AR = ["كانون الثاني","شباط","آذار","نيسان","أيار","حزيران","تموز","آب","أيلول","تشرين الأول","تشرين الثاني","كانون الأول"];
function formatArabicDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return ${d.getDate()} ${MONTHS_AR[d.getMonth()]} ${d.getFullYear()};
}
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug');
const container = document.getElementById('article-content');
if (!slug) {
  container.innerHTML = '<div class="empty">لم يتم تحديد مقال.</div>';
} else {
  fetch('content/articles.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const article = (data.articles || []).find(a => a.slug === slug);
      if (!article) {
        container.innerHTML = '<div class="empty">لم يتم العثور على هذا المقال.</div>';
        return;
      }
      document.title = article.title + ' - الدكتور ميشال الشمّاعي';
      container.innerHTML = `
        ${article.image ? <img class="cover" src="${article.image}" alt=""> : ''}
        <h1>${article.title}</h1>
        <div class="meta">
          ${formatArabicDate(article.date)}
          ${article.category ? <span class="category">${article.category}</span> : ''}
        </div>
        <div class="content">${marked.parse(article.body || '')}</div>
      `;
    })
    .catch(err => {
      container.innerHTML = '<div class="empty">تعذّر تحميل المقال حاليًا.</div>';
      console.error(err);
    });
}
</script>
</body>
</html>
